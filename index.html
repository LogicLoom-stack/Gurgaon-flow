<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Gurgaon Flow - Thermal & AQI Data Layer</title>
  
   <!-- External Libraries -->
   <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  
   <style>
       html, body {
           margin: 0;
           padding: 0;
           background-color: #010204;
           overflow: hidden;
           font-family: 'JetBrains Mono', monospace;
       }
       canvas {
           display: block;
       }
       input[type=range] {
           cursor: pointer;
       }
   </style>
</head>
<body>


   <script>
       /**
        * GURGAON FLOW - Refik Anadol Inspired "Thermal & AQI Layer" v5.1
        * Features: Neon Corridors, Volumetric Haze, Urban Heat Island Mapping
        */


       let gridRes = 60;
       let yearSlider;
       let yearDisplay;
       let aqiDisplay;
       let tempDisplay;
       let flowParticles = [];
       const FLOW_COUNT = 450;


       // Synthetic Data Mapping for Gurgaon
       // temp: Surface temperature index (Celsius avg peak)
       const urbanData = {
           2014: { aqi: 185, temp: 38.2 },
           2015: { aqi: 195, temp: 38.5 },
           2016: { aqi: 230, temp: 39.1 },
           2017: { aqi: 210, temp: 39.4 },
           2018: { aqi: 245, temp: 40.2 },
           2019: { aqi: 235, temp: 40.8 },
           2020: { aqi: 165, temp: 39.5 }, // Slight drop (lockdown/reduced activity)
           2021: { aqi: 205, temp: 41.2 },
           2022: { aqi: 225, temp: 42.5 },
           2023: { aqi: 240, temp: 43.1 },
           2024: { aqi: 255, temp: 44.5 },
           2025: { aqi: 270, temp: 45.8 },
           2026: { aqi: 285, temp: 47.2 }
       };


       let roads = {};


       function setup() {
           createCanvas(windowWidth, windowHeight, WEBGL);
           createUI();
          
           roads = {
               nh48: { s: createVector(-220, -80), e: createVector(220, 100), color: [255, 215, 0], weight: 1.8 },
               dwarkaExp: { s: createVector(-180, -120), e: createVector(-240, 100), color: [0, 255, 180], weight: 1.4 },
               golfCourse: { s: createVector(120, -60), e: createVector(160, 20), color: [255, 140, 0], weight: 1.6 },
               golfCourseExt: { s: createVector(160, 20), e: createVector(200, 90), color: [255, 100, 0], weight: 1.2 },
               sohnaRoad: { s: createVector(-10, 10), e: createVector(-60, 160), color: [180, 255, 50], weight: 1.1 }
           };


           for(let i=0; i<FLOW_COUNT; i++) {
               flowParticles.push(new FlowParticle());
           }


           noiseDetail(10, 0.55);
       }


       function draw() {
           let currentYear = yearSlider.value();
           let data = urbanData[currentYear];
           let currentAQI = data.aqi;
           let currentTemp = data.temp;
          
           let aqiFactor = map(currentAQI, 100, 300, 0, 1);
           let heatFactor = map(currentTemp, 38, 48, 0, 1);
          
           // Atmospheric background shifts slightly more "fiery" with heat
           let bgR = lerp(2, 45, aqiFactor * 0.7 + heatFactor * 0.3);
           let bgG = lerp(4, 20, aqiFactor);
           let bgB = lerp(8, 15, aqiFactor);
           background(bgR, bgG, bgB);
          
           orbitControl(1.2, 1.2, 0.1);


           yearDisplay.html(currentYear);
           updateUIStats(currentAQI, currentTemp);
          
           let growth = (currentYear - 2013) / 13;
           let animTime = millis() * 0.0005;
           let pulse = (sin(animTime * 2) + 1) * 0.5;


           // Perspective
           rotateX(PI / 3.5);
           rotateZ(animTime * 0.02);
           scale(1.4);


           const cyberCity = createVector(100, 40);


           // 1. RENDER ATMOSPHERE (AQI dependent)
           renderPollutionHaze(animTime, currentAQI);


           // 2. RENDER THE VOLUMETRIC TOPOGRAPHY (Thermal sensitive)
           for (let z = -gridRes/2; z < gridRes/2; z++) {
               for (let x = -gridRes/2; x < gridRes/2; x++) {
                   let posX = x * 12;
                   let posZ = z * 12;
                   let p = createVector(posX, posZ);
                  
                   let maxDensity = 0;
                   let nearestRoadColor = [255, 255, 255];
                   let minD = 1000;


                   for (let key in roads) {
                       let road = roads[key];
                       let d = getDistToSegment(p, road.s, road.e);
                       let rDensity = exp(-d / (45 * road.weight)) * (40 * road.weight);
                       if (key === 'dwarkaExp' && currentYear < 2018) rDensity *= 0.1;
                       maxDensity += rDensity;
                       if (d < minD) {
                           minD = d;
                           nearestRoadColor = road.color;
                       }
                   }
                  
                   maxDensity += exp(-p.dist(cyberCity) / 40) * 60;
                  
                   let n1 = noise(posX * 0.006, posZ * 0.006, animTime);
                   let targetH = -(maxDensity * growth * 3.2) - (n1 * 140 * growth);


                   // Add Heat Shimmer (Vibration)
                   if (heatFactor > 0.5) {
                       targetH += sin(animTime * 10 + posX) * (heatFactor * 5);
                   }


                   // --- THERMAL PILLAR STYLING ---
                   // Pillars near high density areas get "hotter" (redder)
                   let localHeat = map(maxDensity, 0, 100, 0, 1) * heatFactor;


                   if (minD < 12) {
                       // Road Pillars: Luminous + Thermal Bloom
                       let alpha = map(targetH, 0, -400, 100, 255);
                       let r = lerp(nearestRoadColor[0], 255, localHeat);
                       let g = lerp(nearestRoadColor[1], 100, localHeat);
                       let b = lerp(nearestRoadColor[2], 50, localHeat);
                       stroke(r, g, b, alpha);
                       strokeWeight(1.5 + pulse * 0.5);
                   } else {
                       // Urban Mass: Cyan shifting to Thermal Magenta/Orange
                       let hBase = map(n1, 0, 1, 185, 205);
                       let hVal = lerp(hBase, 340, localHeat); // Shifting toward red/pink
                       colorMode(HSB, 360, 100, 100, 100);
                       let sat = lerp(80, 90, localHeat);
                       let br = map(targetH, 0, -250, 15, 75);
                       stroke(hVal, sat, br, 35);
                       colorMode(RGB, 255, 255, 255, 255);
                       strokeWeight(0.6);
                   }


                   line(posX, 0, posZ, posX, targetH, posZ);
               }
           }


           // 3. RENDER THE ROAD FILAMENTS
           renderRoadFilaments(animTime, pulse, growth, aqiFactor, heatFactor);


           // 4. RENDER TRAFFIC FLOW
           for(let fp of flowParticles) {
               fp.update(growth);
               fp.display(pulse, aqiFactor, heatFactor);
           }


           // 5. BASE GRID
           renderBase();
       }


       function updateUIStats(aqi, temp) {
           aqiDisplay.html(aqi);
           tempDisplay.html(temp.toFixed(1) + "°C");
           tempDisplay.style('color', temp > 43 ? '#ef4444' : temp > 40 ? '#f97316' : '#fbbf24');
       }


       function renderPollutionHaze(time, aqi) {
           push();
           let dustCount = map(aqi, 100, 300, 40, 350);
           let colR = lerp(120, 180, map(aqi, 100, 300, 0, 1));
           let colG = lerp(210, 160, map(aqi, 100, 300, 0, 1));
           let colB = lerp(255, 120, map(aqi, 100, 300, 0, 1));
          
           for(let i=0; i<dustCount; i++) {
               let x = sin(i + time * 0.2) * 600;
               let z = cos(i * 1.3 + time * 0.2) * 600;
               let y = -400 + sin(time * 0.1 + i) * 300;
               stroke(colR, colG, colB, map(aqi, 100, 300, 10, 45));
               strokeWeight(map(aqi, 100, 300, 0.8, 3.5));
               point(x, y, z);
           }
           pop();
       }


       function renderRoadFilaments(time, pulse, growth, aqiFactor, heatFactor) {
           push();
           noFill();
           let yOffset = -5 - (growth * 10);
           for (let key in roads) {
               let road = roads[key];
               strokeWeight(1 + pulse);
               // Filaments turn slightly more "incandescent" with heat
               let r = lerp(road.color[0], 255, heatFactor * 0.4);
               let alpha = lerp(210, 140, aqiFactor);
               stroke(r, road.color[1], road.color[2], alpha);
               line(road.s.x, yOffset, road.s.y, road.e.x, yOffset, road.e.y);
           }
           pop();
       }


       function getDistToSegment(p, v, w) {
           let line = p5.Vector.sub(w, v);
           let w2 = p5.Vector.sub(p, v);
           let t = constrain(w2.dot(line) / line.magSq(), 0, 1);
           let projection = p5.Vector.add(v, p5.Vector.mult(line, t));
           return p.dist(projection);
       }


       function renderBase() {
           push();
           noFill();
           rotateX(HALF_PI);
           translate(0, 0, 15);
           stroke(255, 255, 255, 10);
           rect(-500, -500, 1000, 1000);
           pop();
       }


       class FlowParticle {
           constructor() { this.init(); }
           init() {
               this.progress = random(1);
               this.speed = random(0.0015, 0.005);
               let keys = Object.keys(roads);
               this.roadKey = keys[floor(random(keys.length))];
               this.history = [];
               this.maxHistory = floor(random(6, 15));
               this.offset = random(-5, 5);
           }
           update(growth) {
               this.progress += this.speed;
               if(this.progress > 1) { this.progress = 0; this.history = []; }
               let road = roads[this.roadKey];
               let pathPos = p5.Vector.lerp(road.s, road.e, this.progress);
               let currentPos = createVector(pathPos.x + this.offset, -12 - (growth * 22), pathPos.y + this.offset);
               this.history.push(currentPos);
               if(this.history.length > this.maxHistory) this.history.shift();
           }
           display(pulse, aqiFactor, heatFactor) {
               if (this.history.length < 2) return;
               noFill();
               let roadColor = roads[this.roadKey].color;
               beginShape();
               for(let i=0; i<this.history.length; i++) {
                   let alpha = map(i, 0, this.history.length, 0, lerp(200, 100, aqiFactor));
                   let r = lerp(roadColor[0], 255, heatFactor * 0.5);
                   stroke(r, roadColor[1], roadColor[2], alpha);
                   strokeWeight(map(i, 0, this.history.length, 0.5, 2.5 + pulse));
                   vertex(this.history[i].x, this.history[i].y, this.history[i].z);
               }
               endShape();
           }
       }


       function createUI() {
           let ui = createDiv('');
           ui.position(40, 40);
           ui.style('color', 'white');
           ui.style('pointer-events', 'none');


           let title = createElement('h1', 'GURUGRAM');
           title.parent(ui);
           title.style('letter-spacing', '22px');
           title.style('margin', '0');
           title.style('font-weight', '100');
           title.style('font-size', '48px');


           let subtitle = createP('THERMAL-ATMOSPHERIC DATA SCULPTURE // v5.1');
           subtitle.parent(ui);
           subtitle.style('font-size', '10px');
           subtitle.style('opacity', '0.4');
           subtitle.style('margin-top', '10px');
           subtitle.style('letter-spacing', '6px');


           let ctrl = createDiv('');
           ctrl.position(40, height - 200);
           ctrl.style('background', 'rgba(1, 2, 5, 0.95)');
           ctrl.style('padding', '35px');
           ctrl.style('border-radius', '30px');
           ctrl.style('color', 'white');
           ctrl.style('border', '1px solid rgba(255, 255, 255, 0.1)');
           ctrl.style('width', '360px');
           ctrl.style('backdrop-filter', 'blur(40px)');
           ctrl.style('pointer-events', 'auto');


           let header = createDiv('');
           header.parent(ctrl);
           header.style('display', 'flex');
           header.style('justify-content: space-between');
           header.style('align-items: flex-end');
           header.style('margin-bottom', '20px');


           let yearGroup = createDiv('');
           yearGroup.parent(header);
           createSpan('HORIZON').parent(yearGroup).style('font-size', '9px').style('opacity', '0.4');
           yearDisplay = createElement('div', '2014').parent(yearGroup).style('font-size', '44px').style('font-weight', '900');


           let statsGroup = createDiv('');
           statsGroup.parent(header);
           statsGroup.style('text-align', 'right');
          
           let aqiRow = createDiv('');
           aqiRow.parent(statsGroup);
           createSpan('AQI: ').parent(aqiRow).style('font-size', '10px').style('opacity', '0.4');
           aqiDisplay = createSpan('185').parent(aqiRow).style('font-size', '18px').style('font-weight', 'bold').style('color', '#22d3ee');
          
           let tempRow = createDiv('');
           tempRow.parent(statsGroup);
           createSpan('THERMAL INDEX: ').parent(tempRow).style('font-size', '10px').style('opacity', '0.4');
           tempDisplay = createSpan('38.2°C').parent(tempRow).style('font-size', '18px').style('font-weight', 'bold');


           yearSlider = createSlider(2014, 2026, 2014);
           yearSlider.parent(ctrl);
           yearSlider.style('width', '100%');
           yearSlider.style('accent-color', '#22d3ee');


           createP('DRAG TO EVOLVE • OBSERVE THERMAL BLOOM IN DENSE AREAS').parent(ctrl).style('font-size', '8px').style('margin-top', '25px').style('opacity', '0.2').style('text-align', 'center');
       }


       function windowResized() {
           resizeCanvas(windowWidth, windowHeight);
       }
   </script>
</body>
</html>
